set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_default_fill 'number'
set -g @catppuccin_window_default_text ' #W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_status_left_separator  ' î‚¶'
set -g @catppuccin_status_right_separator 'î‚´'
set -g @catppuccin_status_right_separator_inverse 'no'
set -g @catppuccin_status_fill 'icon'
set -g @catppuccin_status_connect_separator 'no'
run '~/.tmux/plugins/tmux/catppuccin.tmux'

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_session}'
set -ag status-right '#{E:@catppuccin_status_application}'
set -agF status-right '#{E:@catppuccin_status_cpu}'
set -agF status-right ' #[bg=#{@thm_blue},fg=#{@thm_crust},reverse]î‚¶#[noreverse]î‰¦  #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #{l:#{ram_percentage}}#[reverse,fg=#{@thm_crust}]î‚´#[noreverse,bg=default]'
set -agF status-right ' #[bg=#{@thm_pink},fg=#{@thm_crust},reverse]î‚¶#[noreverse]ó°ƒ° #[fg=#{@thm_fg},bg=#{@thm_surface_0}] %a, %d %b %Y %H:%M#[reverse,fg=#{@thm_crust}]î‚´#[noreverse,bg=default]'

# --- Plugin Manager ---

# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
run '~/.tmux/plugins/tpm/tpm'

# --- Status ---

set -g status-bg 'default'
set -g status-style 'bg=default'

