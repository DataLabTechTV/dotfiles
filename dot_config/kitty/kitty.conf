# theme
include themes/catppuccin-mocha.conf

term xterm-kitty
linux_display_server wayland

enable_audio_bell no
mouse_hide_wait -1

# history
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# cursor
cursor_shape block
cursor_blink_interval 1
cursor_stop_blinking_after 0
shell_integration no-cursor

# font
font_family CaskaydiaCove Nerd Font
font_size 12.0

# transparency
background_opacity 0.8
background_blur 1

# dimensions
remember_window_size  no
initial_window_width  105c
initial_window_height 35c

# layout window customization
window_border_width 0.5pt
enabled_layouts tall
window_padding_width 0
window_margin_width 2
hide_window_decorations no

# tab bar customization
tab_bar_style powerline
tab_powerline_style round
tab_bar_edge top
tab_bar_align left
active_tab_font_style   bold
inactive_tab_font_style normal

# reload config
map ctrl+shift+f5 load_config_file

# navigation
map shift+pgup scroll_page_up
map shift+pgdn scroll_page_down

# zoom
map ctrl+0 change_font_size all 0
map ctrl+plus change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map f11 toggle_fullscreen

# window management 
map ctrl+shift+enter new_window
map ctrl+shift+right next_window
map ctrl+shift+left previous_window

# layout management
map ctrl+shift+l next_layout
map ctrl+alt+r goto_layout tall
map ctrl+alt+s goto_layout stack

# tab management
map ctrl+shift+t new_tab
map ctrl+shift+pgdn next_tab
map ctrl+shift+pgup previous_tab
map ctrl+shift+w close_tab
